name: CI Main

on:
  push:
    branches: [main]

concurrency:
  group: ci-main-main
  cancel-in-progress: false

permissions:
  contents: read

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}
  PLATFORM_AMD64: linux/amd64
  RELEASE_SNAPSHOT_NOTES_REF: refs/notes/release-snapshots

jobs:
  typecheck-quality-gates:
    name: Typecheck & Quality Gates
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install system dependencies
        run: sudo apt-get update && sudo apt-get install -y pkg-config libsqlite3-dev

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version-file: .bun-version

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Check quality-gates scripts
        run: |
          python3 -m py_compile \
            .github/scripts/metadata_gate.py \
            .github/scripts/check_live_quality_gates.py \
            .github/scripts/check_quality_gates_contract.py \
            .github/scripts/release_snapshot.py

      - name: Run typecheck
        run: bun run typecheck

      - name: Quality-gates contract check
        run: |
          python3 .github/scripts/check_quality_gates_contract.py \
            --repo-root "$PWD" \
            --declaration .github/quality-gates.json \
            --metadata-script .github/scripts/metadata_gate.py

      - name: Quality-gates live rules check
        env:
          QUALITY_GATES_LIVE_RULES_MODE: require
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          python3 .github/scripts/check_live_quality_gates.py \
            --repo "${{ github.repository }}" \
            --declaration .github/quality-gates.json

  bun-tests:
    name: Bun Tests
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install system dependencies
        run: sudo apt-get update && sudo apt-get install -y pkg-config libsqlite3-dev

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version-file: .bun-version

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Run bun test
        run: bun test

  web-build:
    name: Web Build
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install system dependencies
        run: sudo apt-get update && sudo apt-get install -y pkg-config libsqlite3-dev

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version-file: .bun-version

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Build web app
        run: bun run web:build

  storybook-build:
    name: Storybook Build
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install system dependencies
        run: sudo apt-get update && sudo apt-get install -y pkg-config libsqlite3-dev

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version-file: .bun-version

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Build Storybook
        run: bun run build-storybook

  docker-smoke:
    name: Docker Smoke
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build smoke image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          load: true
          platforms: ${{ env.PLATFORM_AMD64 }}
          tags: tavreg-hikari:main-smoke-${{ github.run_id }}-${{ github.run_attempt }}
          build-args: |
            APP_EFFECTIVE_VERSION=main-${{ github.run_id }}-${{ github.run_attempt }}

      - name: Smoke test image
        shell: bash
        env:
          SMOKE_TAG: tavreg-hikari:main-smoke-${{ github.run_id }}-${{ github.run_attempt }}
          SMOKE_CONTAINER_NAME: smoke-tavreg-hikari-main-${{ github.run_id }}-${{ github.run_attempt }}
          SMOKE_PLATFORM: ${{ env.PLATFORM_AMD64 }}
        run: ./.github/scripts/smoke-test-image.sh "$SMOKE_TAG"

  release-snapshot:
    name: Release Snapshot
    runs-on: ubuntu-latest
    needs: [typecheck-quality-gates, bun-tests, web-build, storybook-build, docker-smoke]
    permissions:
      actions: read
      contents: write
      issues: read
      pull-requests: read
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Configure git identity for release notes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Ensure immutable release snapshot
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          python3 .github/scripts/release_snapshot.py ensure \
            --target-sha "${GITHUB_SHA}" \
            --github-repository "${GITHUB_REPOSITORY}" \
            --github-token "${GITHUB_TOKEN}" \
            --notes-ref "${RELEASE_SNAPSHOT_NOTES_REF}" \
            --registry "${REGISTRY}" \
            --output "$RUNNER_TEMP/release-snapshot.json"
