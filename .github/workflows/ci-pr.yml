name: CI PR

on:
  pull_request:
    branches: [main]
    types: [opened, reopened, synchronize, ready_for_review, edited]

concurrency:
  group: ci-pr-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}
  PLATFORM_AMD64: linux/amd64

jobs:
  typecheck-quality-gates:
    name: Typecheck & Quality Gates
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install system dependencies
        run: sudo apt-get update && sudo apt-get install -y pkg-config libsqlite3-dev

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version-file: .bun-version

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Check quality-gates scripts
        run: |
          python3 -m py_compile \
            .github/scripts/metadata_gate.py \
            .github/scripts/check_live_quality_gates.py \
            .github/scripts/check_quality_gates_contract.py \
            .github/scripts/release_snapshot.py

      - name: Run typecheck
        run: bun run typecheck

      - name: Quality-gates contract check
        run: |
          python3 .github/scripts/check_quality_gates_contract.py \
            --repo-root "$PWD" \
            --declaration .github/quality-gates.json \
            --metadata-script .github/scripts/metadata_gate.py

      - name: Quality-gates live rules check
        env:
          QUALITY_GATES_LIVE_RULES_MODE: require
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          python3 .github/scripts/check_live_quality_gates.py \
            --repo "${{ github.repository }}" \
            --declaration .github/quality-gates.json

  bun-tests:
    name: Bun Tests
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install system dependencies
        run: sudo apt-get update && sudo apt-get install -y pkg-config libsqlite3-dev

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version-file: .bun-version

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Run bun test
        run: bun test

  web-build:
    name: Web Build
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install system dependencies
        run: sudo apt-get update && sudo apt-get install -y pkg-config libsqlite3-dev

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version-file: .bun-version

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Build web app
        run: bun run web:build

  storybook-build:
    name: Storybook Build
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install system dependencies
        run: sudo apt-get update && sudo apt-get install -y pkg-config libsqlite3-dev

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version-file: .bun-version

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Build Storybook
        run: bun run build-storybook

  fingerprint-browser-install-macos:
    name: Fingerprint Browser Install (macOS)
    runs-on: macos-latest
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version-file: .bun-version

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Install fingerprint browser
        run: bash ./scripts/install-fingerprint-browser.sh --platform macos --dest .tools --cache-dir downloads/fingerprint-browser --force

      - name: Smoke fingerprint browser
        run: node ./scripts/smoke-fingerprint-browser.mjs .tools/Chromium.app/Contents/MacOS/Chromium

  fingerprint-browser-install-linux:
    name: Fingerprint Browser Install (Linux)
    runs-on: ubuntu-latest
    container: mcr.microsoft.com/playwright:v1.58.2-noble
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version-file: .bun-version

      - name: Install xz utils
        run: apt-get update && apt-get install -y xz-utils

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Install fingerprint browser
        run: bash ./scripts/install-fingerprint-browser.sh --platform linux --dest .tools/fingerprint-browser/linux --cache-dir downloads/fingerprint-browser --force

      - name: Smoke fingerprint browser
        run: node ./scripts/smoke-fingerprint-browser.mjs .tools/fingerprint-browser/linux/chrome

  docker-smoke:
    name: Docker Smoke
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build smoke image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          load: true
          platforms: ${{ env.PLATFORM_AMD64 }}
          tags: tavreg-hikari:pr-smoke-${{ github.run_id }}-${{ github.run_attempt }}
          build-args: |
            APP_EFFECTIVE_VERSION=pr-${{ github.run_id }}-${{ github.run_attempt }}

      - name: Smoke test image
        shell: bash
        env:
          SMOKE_TAG: tavreg-hikari:pr-smoke-${{ github.run_id }}-${{ github.run_attempt }}
          SMOKE_CONTAINER_NAME: smoke-tavreg-hikari-pr-${{ github.run_id }}-${{ github.run_attempt }}
          SMOKE_PLATFORM: ${{ env.PLATFORM_AMD64 }}
        run: ./.github/scripts/smoke-test-image.sh "$SMOKE_TAG"
