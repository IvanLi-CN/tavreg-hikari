name: PR Preview

on:
  workflow_dispatch:
    inputs:
      pr_number:
        description: Pull request number to build from
        required: true
        type: string
  pull_request:
    branches: [main]
    types: [labeled]

concurrency:
  group: pr-preview-${{ github.event.pull_request.number || inputs.pr_number }}
  cancel-in-progress: true

permissions:
  contents: read
  packages: write
  pull-requests: write

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}
  PLATFORM_AMD64: linux/amd64
  PREVIEW_LABEL: preview:build

jobs:
  build-preview:
    name: Build + Smoke + Push PR Preview
    runs-on: ubuntu-latest
    if: ${{ github.event_name == 'workflow_dispatch' || github.event.label.name == 'preview:build' }}
    timeout-minutes: 45
    steps:
      - name: Resolve PR preview target
        id: preview
        uses: actions/github-script@v7
        with:
          script: |
            const { owner, repo } = context.repo
            const rawPrNumber =
              context.eventName === 'workflow_dispatch'
                ? '${{ inputs.pr_number }}'
                : String(context.payload.pull_request?.number || '')
            const prNumber = Number(rawPrNumber)
            if (!Number.isInteger(prNumber) || prNumber <= 0) {
              core.setFailed(`Invalid pr_number: ${rawPrNumber}`)
              return
            }

            const { data: pull } = await github.rest.pulls.get({
              owner,
              repo,
              pull_number: prNumber,
            })
            if (pull.state !== 'open') {
              core.setFailed(`PR #${prNumber} is ${pull.state}; preview builds require an open PR`)
              return
            }
            if (pull.base.ref !== 'main') {
              core.setFailed(`PR #${prNumber} targets ${pull.base.ref}; preview builds only support main`)
              return
            }
            if (pull.head.repo.full_name !== `${owner}/${repo}`) {
              core.setFailed(`PR #${prNumber} comes from ${pull.head.repo.full_name}; preview builds require same-repository branches`)
              return
            }

            const headSha = pull.head.sha
            const shortSha = headSha.slice(0, 12)
            const imageName = `${process.env.REGISTRY}/${process.env.IMAGE_NAME}`.toLowerCase()
            const immutableTag = `${imageName}:pr-${prNumber}-${shortSha}`
            const latestTag = `${imageName}:pr-${prNumber}-latest`
            const smokeTag = `${imageName}:pr-smoke-${prNumber}-${shortSha}`
            const appVersion = `pr-${prNumber}-${shortSha}`

            core.setOutput('pr_number', String(prNumber))
            core.setOutput('head_repo', pull.head.repo.full_name)
            core.setOutput('head_sha', headSha)
            core.setOutput('base_sha', pull.base.sha)
            core.setOutput('short_sha', shortSha)
            core.setOutput('image_name', imageName)
            core.setOutput('immutable_tag', immutableTag)
            core.setOutput('latest_tag', latestTag)
            core.setOutput('smoke_tag', smokeTag)
            core.setOutput('app_version', appVersion)

      - name: Checkout trusted workflow revision
        uses: actions/checkout@v4
        with:
          ref: ${{ steps.preview.outputs.base_sha }}
          path: trusted

      - name: Checkout PR head
        uses: actions/checkout@v4
        with:
          repository: ${{ steps.preview.outputs.head_repo }}
          ref: ${{ steps.preview.outputs.head_sha }}
          path: source

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build preview image
        uses: docker/build-push-action@v6
        with:
          context: ./source
          file: ./source/Dockerfile
          load: true
          platforms: ${{ env.PLATFORM_AMD64 }}
          tags: |
            ${{ steps.preview.outputs.smoke_tag }}
            ${{ steps.preview.outputs.immutable_tag }}
            ${{ steps.preview.outputs.latest_tag }}
          build-args: |
            APP_EFFECTIVE_VERSION=${{ steps.preview.outputs.app_version }}

      - name: Smoke test image
        shell: bash
        env:
          SMOKE_TAG: ${{ steps.preview.outputs.smoke_tag }}
          SMOKE_CONTAINER_NAME: smoke-tavreg-hikari-pr-preview-${{ steps.preview.outputs.pr_number }}-${{ steps.preview.outputs.short_sha }}
          SMOKE_PLATFORM: ${{ env.PLATFORM_AMD64 }}
        run: ./trusted/.github/scripts/smoke-test-image.sh "$SMOKE_TAG"

      - name: Push preview image
        id: push
        shell: bash
        env:
          IMMUTABLE_TAG: ${{ steps.preview.outputs.immutable_tag }}
          LATEST_TAG: ${{ steps.preview.outputs.latest_tag }}
        run: |
          set -euo pipefail
          docker push "$IMMUTABLE_TAG"
          docker push "$LATEST_TAG"
          digest="$(docker buildx imagetools inspect "$IMMUTABLE_TAG" | awk '/^Digest:/ {print $2; exit}')"
          if [[ -z "$digest" ]]; then
            echo "Unable to resolve digest for $IMMUTABLE_TAG" >&2
            exit 1
          fi
          echo "digest=$digest" >> "$GITHUB_OUTPUT"

      - name: Upsert PR preview image comment
        uses: actions/github-script@v7
        env:
          PR_NUMBER: ${{ steps.preview.outputs.pr_number }}
          HEAD_SHA: ${{ steps.preview.outputs.head_sha }}
          IMMUTABLE_TAG: ${{ steps.preview.outputs.immutable_tag }}
          LATEST_TAG: ${{ steps.preview.outputs.latest_tag }}
          DIGEST: ${{ steps.push.outputs.digest }}
          APP_VERSION: ${{ steps.preview.outputs.app_version }}
        with:
          script: |
            const { owner, repo } = context.repo
            const marker = '<!-- tavreg-hikari-pr-preview-image-comment -->'
            const issueNumber = Number(process.env.PR_NUMBER)
            const digest = process.env.DIGEST
            const immutableTag = process.env.IMMUTABLE_TAG
            const latestTag = process.env.LATEST_TAG
            const headSha = process.env.HEAD_SHA
            const appVersion = process.env.APP_VERSION
            if (!Number.isInteger(issueNumber) || issueNumber <= 0 || !digest) {
              core.setFailed('Missing PR number or preview image digest')
              return
            }

            const body = [
              marker,
              'PR preview image is ready.',
              `Image: \`${immutableTag}\``,
              `Latest: \`${latestTag}\``,
              `Digest: \`${digest}\``,
              `Version: \`${appVersion}\``,
              `Commit: \`${headSha}\``,
            ].join('\n')

            const comments = await github.paginate(github.rest.issues.listComments, {
              owner,
              repo,
              issue_number: issueNumber,
              per_page: 100,
            })
            const foreign = comments.find(
              comment =>
                typeof comment.body === 'string' &&
                comment.body.includes(marker) &&
                (comment.user?.type !== 'Bot' || comment.user?.login !== 'github-actions[bot]')
            )
            if (foreign) {
              core.warning(
                `Found marker comment ${foreign.id} owned by ${foreign.user?.login || 'unknown'}; leaving preview comment unchanged`
              )
              return
            }
            const existing = comments.find(
              comment =>
                typeof comment.body === 'string' &&
                comment.body.includes(marker) &&
                comment.user?.type === 'Bot' &&
                comment.user?.login === 'github-actions[bot]'
            )
            if (existing) {
              await github.rest.issues.updateComment({ owner, repo, comment_id: existing.id, body })
              return
            }
            await github.rest.issues.createComment({ owner, repo, issue_number: issueNumber, body })
